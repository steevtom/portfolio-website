<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Steev Tom Alenchery</title>
  <style>
    :root {
      --bg: #0F172A;
      --surface: #111827;
      --surface-2: #1F2937;
      --text: #E5E7EB;
      --muted: #9CA3AF;
      --line: #334155;
      --accent-blue: #38BDF8;
      --accent-green: #22C55E;
    }

    body[data-theme="light"] {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #e2e8f0;
      --text: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --accent-blue: #0ea5e9;
      --accent-green: #16a34a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Nav (portfolio-compatible) */
    .top-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px;
      z-index: 20;
    }

    .top-nav a {
      padding: 8px 12px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      font-size: 0.92rem;
    }

    .top-nav a:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .theme-toggle {
      margin-left: auto;
      padding: 8px 12px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .theme-toggle:hover {
      border-color: var(--accent-blue);
    }

    /* Main split layout */
    .page {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .left-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6% 8%;
      z-index: 10;
      overflow-y: auto;
    }

    .right-section {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at center, #1a1a3a 0%, var(--bg) 70%);
      min-height: 300px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 1.4rem;
      text-transform: uppercase;
      color: var(--text);
    }

    .contact-info {
      margin-bottom: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .info-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .info-item h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--accent-blue);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .info-item p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
      margin-bottom: 4px;
    }

    .info-item a {
      color: var(--text);
      text-decoration: none;
    }

    .info-item a:hover {
      color: var(--accent-green);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 520px;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    input, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 13px;
      border-radius: 8px;
      outline: none;
      font: inherit;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
    }

    input:focus, textarea:focus {
      border-color: var(--accent-blue);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .mail-btn {
      background: var(--accent-blue);
      color: #0F172A;
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      text-decoration: none;
      font-size: 0.85rem;
      transition: transform 0.2s, background 0.2s;
    }

    button:hover,
    .mail-btn:hover {
      background: #22aee8;
      transform: translateY(-2px);
    }

    .mail-btn.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .mail-btn.secondary:hover {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: var(--surface-2);
    }

    #earth-canvas {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #earth-canvas:active {
      cursor: grabbing;
    }

    @media (max-width: 950px) {
      body {
        overflow: auto;
      }

      .page {
        flex-direction: column;
        min-height: auto;
      }

      .left-section {
        order: 2;
        padding: 26px 16px 30px;
      }

      .right-section {
        order: 1;
        height: 380px;
      }

      .contact-info {
        grid-template-columns: 1fr;
      }

      .form-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="images.html">Images</a>
    <a href="videos.html">Videos</a>
    <a href="projects.html">Websites & Games</a>
    <a href="experience.html">Experience</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="page">
    <section class="left-section">
      <h1>Contact</h1>

      <div class="contact-info">
        <div class="info-item">
          <h3>Location</h3>
          <p>Ottawa, Canada</p>
        </div>

        <div class="info-item">
          <h3>Email</h3>
          <p>
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=steevtom123@gmail.com"
               target="_blank" rel="noopener">
              steevtom123@gmail.com
            </a>
          </p>
        </div>

        <div class="info-item">
          <h3>GitHub</h3>
          <p>
            <a href="https://github.com/steevtom" target="_blank" rel="noopener">
              github.com/steevtom
            </a>
          </p>
        </div>

        <div class="info-item">
          <h3>Availability</h3>
          <p>Open to creative media and web opportunities.</p>
        </div>
      </div>

      <form id="contact-form">
        <div class="form-row">
          <input id="name-input" type="text" placeholder="Name" required />
          <input id="email-input" type="email" placeholder="Email" required />
        </div>
        <textarea id="message-input" rows="4" placeholder="Your Message" required></textarea>
        <div class="btn-row">
          <button type="submit">Send Message</button>
          
        </div>
      </form>
    </section>

    <section class="right-section">
      <div id="earth-canvas"></div>
    </section>
  </main>

  <script src="script.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const form = document.getElementById('contact-form');
    const nameInput = document.getElementById('name-input');
    const emailInput = document.getElementById('email-input');
    const messageInput = document.getElementById('message-input');

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const message = messageInput.value.trim();

      const subject = encodeURIComponent(`Portfolio Inquiry from ${name}`);
      const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);
      const gmailComposeUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=steevtom123@gmail.com&su=${subject}&body=${body}`;
      const mailtoUrl = `mailto:steevtom123@gmail.com?subject=${subject}&body=${body}`;

      window.location.href = gmailComposeUrl;
      setTimeout(() => {
        window.location.href = mailtoUrl;
      }, 900);
    });

    const container = document.getElementById('earth-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.offsetWidth, container.offsetHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;
    controls.enableZoom = false;

    camera.position.z = 5;

    const textureLoader = new THREE.TextureLoader();
    const earthDayMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
    const earthBumpMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_bump_2048.jpg');
    const earthSpecularMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
    const earthCloudMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 96, 96),
      new THREE.MeshPhongMaterial({
        map: earthDayMap,
        bumpMap: earthBumpMap,
        bumpScale: 0.06,
        specularMap: earthSpecularMap,
        specular: new THREE.Color(0x3a5f85),
        shininess: 20
      })
    );
    earthGroup.add(earth);

    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(1.515, 96, 96),
      new THREE.MeshPhongMaterial({
        map: earthCloudMap,
        transparent: true,
        opacity: 0.35,
        depthWrite: false
      })
    );
    earthGroup.add(clouds);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.56, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x3b82f6,
        transparent: true,
        opacity: 0.12,
        side: THREE.BackSide
      })
    );
    earthGroup.add(atmosphere);

    function createLocationPin() {
      const markerGroup = new THREE.Group();

      const pinShape = new THREE.Shape();
      pinShape.moveTo(0, -0.58);
      pinShape.bezierCurveTo(0.4, -0.16, 0.43, 0.18, 0, 0.46);
      pinShape.bezierCurveTo(-0.43, 0.18, -0.4, -0.16, 0, -0.58);

      const pinMesh = new THREE.Mesh(
        new THREE.ExtrudeGeometry(pinShape, {
          depth: 0.12,
          bevelEnabled: true,
          bevelThickness: 0.045,
          bevelSize: 0.03,
          bevelSegments: 4,
          curveSegments: 24
        }),
        new THREE.MeshStandardMaterial({
          color: 0xef4444,
          roughness: 0.35,
          metalness: 0.1
        })
      );
      pinMesh.rotation.x = Math.PI;
      pinMesh.rotation.z = Math.PI;
      pinMesh.scale.setScalar(0.14);
      markerGroup.add(pinMesh);

      return markerGroup;
    }

    const pin = createLocationPin();
    pin.position.set(-1.05, 1.15, 0.25);
    pin.lookAt(pin.position.clone().multiplyScalar(2));
    earthGroup.add(pin);

    scene.add(new THREE.AmbientLight(0xffffff, 0.45));
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(4, 3, 6);
    scene.add(dir);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      earth.rotation.y += 0.0008;
      clouds.rotation.y += 0.001;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      const w = container.offsetWidth;
      const h = container.offsetHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  </script>
</body>
</html>
