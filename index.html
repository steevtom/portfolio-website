<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Steev Tom Alenchery | Portfolio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas#game {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #hero-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.6s ease;
  }

  #hero-overlay h1 {
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
    text-shadow:
      0 0 30px rgba(220, 38, 38, 0.6),
      0 0 80px rgba(220, 38, 38, 0.25);
    line-height: 1.1;
    text-align: center;
  }

  #hero-overlay h1 span.accent {
    color: #ef4444;
    display: block;
    font-size: 0.45em;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.4em;
    text-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
  }

  #hero-overlay .cta {
    margin-top: 2.2rem;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 1rem 0 1.2rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    pointer-events: auto;
  }

  #bottom-bar a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  #bottom-bar a:hover { color: #ef4444; }

  #hud {
    position: fixed;
    top: 1.2rem;
    right: 1.5rem;
    z-index: 15;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.04em;
  }
  #hud .val { color: #ef4444; font-weight: 700; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hero-overlay">
  <h1>
    Welcome to My Portfolio
    <span class="accent">Friendly Neighbourhood Developer</span>
  </h1>
  <p class="cta">Move your cursor to guide Spider-Man</p>
</div>

<div id="hud">
  Distance <span class="val" id="score">0</span> m
</div>

<div id="bottom-bar">
  <a href="images.html">Images</a>
  <a href="videos.html">Videos</a>
  <a href="projects.html">Websites & Games</a>
  <a href="experience.html">Experience</a>
  <a href="contact.html">Contact</a>
</div>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const PAL = {
    sky1: '#0a0a2e',
    sky2: '#1a1045',
    sky3: '#2d1b69',
    star: '#ffffff',
    bldgFar:  '#0d0d22',
    bldgMid:  '#111133',
    bldgNear: '#181840',
    windowLit: '#fbbf24',
    windowDim: '#1e1e50',
    spideyBody: '#dc2626',
    spideyBlue: '#1e3a8a',
    spideyEye:  '#fafafa'
  };

  const mouse = { x: W / 2, y: H / 2 };
  let distance = 0;
  const BASE_SCROLL = 1.8;
  let scrollSpeed = BASE_SCROLL;
  let time = 0;

  const spidey = {
    x: W * 0.25,
    y: H * 0.45,
    angle: 0,
    trail: []
  };

  canvas.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
  }, { passive: false });

  const stars = Array.from({ length: 160 }, () => ({
    x: Math.random() * W * 2,
    y: Math.random() * H * 0.5,
    r: Math.random() * 1.4 + 0.3,
    tw: Math.random() * Math.PI * 2
  }));

  function makeBuildings(count, minH, maxH, minW, maxW, color, winColor) {
    const arr = [];
    let cx = -maxW;
    for (let i = 0; i < count; i++) {
      const w = minW + Math.random() * (maxW - minW);
      const h = minH + Math.random() * (maxH - minH);
      const windows = [];
      const cols = Math.floor(w / 18);
      const rows = Math.floor(h / 22);

      for (let r = 1; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (Math.random() > 0.35) {
            windows.push({
              rx: (c + 0.5) / cols,
              ry: r / rows,
              lit: Math.random() > 0.55,
              flicker: Math.random()
            });
          }
        }
      }
      arr.push({ x: cx, w, h, color, winColor, windows });
      cx += w + 4 + Math.random() * 20;
    }
    return arr;
  }

  let bldgFar  = makeBuildings(50, H * 0.25, H * 0.55, 50, 110, PAL.bldgFar,  PAL.windowDim);
  let bldgMid  = makeBuildings(40, H * 0.30, H * 0.65, 55, 130, PAL.bldgMid,  PAL.windowLit);
  let bldgNear = makeBuildings(30, H * 0.35, H * 0.78, 70, 160, PAL.bldgNear, PAL.windowLit);

  function scrollBuildings(arr, speed) {
    let maxX = -Infinity;
    arr.forEach(b => { if (b.x + b.w > maxX) maxX = b.x + b.w; });
    arr.forEach(b => {
      b.x -= speed;
      if (b.x + b.w < -200) {
        b.x = maxX + 4 + Math.random() * 30;
        maxX = b.x + b.w;
      }
    });
  }

  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, PAL.sky1);
    g.addColorStop(0.5, PAL.sky2);
    g.addColorStop(1, PAL.sky3);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawStars() {
    stars.forEach(s => {
      s.x -= scrollSpeed * 0.15;
      if (s.x < -5) s.x += W + 10;
      s.tw += 0.02;
      const alpha = 0.4 + 0.6 * Math.abs(Math.sin(s.tw));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = PAL.star;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawMoon() {
    const mx = W * 0.82, my = H * 0.1, mr = 45;
    ctx.save();
    ctx.shadowColor = 'rgba(255,255,200,0.4)';
    ctx.shadowBlur = 60;
    const mg = ctx.createRadialGradient(mx - 8, my - 8, mr * 0.1, mx, my, mr);
    mg.addColorStop(0, '#fffde7');
    mg.addColorStop(1, '#fdd835');
    ctx.fillStyle = mg;
    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBuildingLayer(arr) {
    arr.forEach(b => {
      if (b.x > W + 10 || b.x + b.w < -10) return;
      const by = H - b.h;
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, by, b.w, b.h);

      b.windows.forEach(w => {
        const wx = b.x + w.rx * b.w;
        const wy = by + w.ry * b.h;
        const flickerNow = w.lit && (Math.sin(time * 0.5 + w.flicker * 100) > -0.1);
        ctx.fillStyle = flickerNow ? b.winColor : PAL.windowDim;
        ctx.globalAlpha = flickerNow ? 0.85 : 0.25;
        ctx.fillRect(wx - 4, wy - 5, 8, 10);
      });
      ctx.globalAlpha = 1;
    });
  }

  function drawSpideyBody() {
    ctx.fillStyle = PAL.spideyBody;
    ctx.beginPath();
    ctx.ellipse(0, 4, 11, 16, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = PAL.spideyBlue;
    ctx.beginPath();
    ctx.ellipse(-8, 6, 5, 13, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8, 6, 5, 13, 0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = PAL.spideyBody;
    ctx.beginPath();
    ctx.arc(0, -14, 11, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = PAL.spideyEye;
    ctx.beginPath(); ctx.ellipse(-5, -16, 5, 4.5, -0.25, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5, -16, 5, 4.5, 0.25, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = PAL.spideyBlue;
    ctx.lineWidth = 3.5;
    const legSwing = Math.sin(time * 8) * 0.35;
    ctx.beginPath(); ctx.moveTo(-4, 18); ctx.quadraticCurveTo(-10, 30 + legSwing * 5, -6, 38 + legSwing * 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4, 18);  ctx.quadraticCurveTo(10, 30 - legSwing * 5, 6, 38 - legSwing * 8);  ctx.stroke();

    ctx.strokeStyle = PAL.spideyBody;
    ctx.lineWidth = 3;
    const armSwing = Math.sin(time * 6) * 0.4;
    ctx.beginPath(); ctx.moveTo(-10, 0); ctx.quadraticCurveTo(-22 - armSwing * 4, -6, -20, -16 + armSwing * 6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10, 0);  ctx.quadraticCurveTo(22 + armSwing * 4, -6, 20, -16 - armSwing * 6);  ctx.stroke();
  }

  function drawSpidey() {
    spidey.trail.push({ x: spidey.x, y: spidey.y, angle: spidey.angle, alpha: 0.35 });
    if (spidey.trail.length > 8) spidey.trail.shift();

    spidey.trail.forEach((t, i) => {
      const a = t.alpha * (i / spidey.trail.length) * 0.45;
      if (a < 0.02) return;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(t.x, t.y);
      ctx.rotate(t.angle);
      drawSpideyBody();
      ctx.restore();
    });

    ctx.save();
    ctx.translate(spidey.x, spidey.y);
    ctx.rotate(spidey.angle);
    drawSpideyBody();
    ctx.restore();
  }

  function update(dt) {
    time += dt;

    scrollBuildings(bldgFar,  scrollSpeed * 0.3);
    scrollBuildings(bldgMid,  scrollSpeed * 0.65);
    scrollBuildings(bldgNear, scrollSpeed * 1.0);

    distance += scrollSpeed * 0.12;
    document.getElementById('score').textContent = Math.floor(distance);

    // Follow cursor smoothly
    const ease = 0.08;
    spidey.x += (mouse.x - spidey.x) * ease;
    spidey.y += (mouse.y - spidey.y) * ease;

    // Subtle facing/tilt
    const dx = mouse.x - spidey.x;
    const dy = mouse.y - spidey.y;
    const targetAngle = Math.atan2(dx, -Math.abs(dy) - 0.1) * 0.28;
    spidey.angle += (targetAngle - spidey.angle) * 0.1;
  }

  let lastTime = performance.now();
  function frame(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    update(dt);
    ctx.clearRect(0, 0, W, H);

    drawSky();
    drawMoon();
    drawStars();
    drawBuildingLayer(bldgFar);
    drawBuildingLayer(bldgMid);
    drawSpidey();
    drawBuildingLayer(bldgNear);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>

  <script src="script.js"></script>
</body>
</html>
